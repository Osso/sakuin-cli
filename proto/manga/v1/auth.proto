syntax = "proto3";

package manga.v1;

// User account
message User {
  int64 id = 1;
  string username = 2;
  string email = 3;
  string created_at = 4;
  optional string custom_css = 5;
}

// Auth response with token
message AuthResponse {
  string token = 1;
  User user = 2;
}

// ============ Passkey (WebAuthn) ============

message BeginPasskeyRegistrationRequest {
  // Optional - if not provided, a random username will be generated
  optional string username = 1;
  optional string email = 2;
}

message BeginPasskeyRegistrationResponse {
  // JSON-encoded PublicKeyCredentialCreationOptions
  string options_json = 1;
  // Generated username (returned so client knows what was used)
  string username = 2;
}

message FinishPasskeyRegistrationRequest {
  // Username from BeginPasskeyRegistrationResponse
  string username = 1;
  // JSON-encoded AuthenticatorAttestationResponse
  string credential_json = 2;
}

message BeginPasskeyLoginRequest {
  // Optional - if not provided, allows discoverable credentials
  optional string username = 1;
}

message BeginPasskeyLoginResponse {
  // JSON-encoded PublicKeyCredentialRequestOptions
  string options_json = 1;
}

message FinishPasskeyLoginRequest {
  // JSON-encoded AuthenticatorAssertionResponse
  string credential_json = 1;
}

// ============ Google OAuth ============

message GetGoogleAuthUrlRequest {}

message GetGoogleAuthUrlResponse {
  string url = 1;
  string state = 2;
}

message GoogleCallbackRequest {
  string code = 1;
  string state = 2;
}

// ============ Dev Login (localhost only) ============

message DevLoginRequest {
  string username = 1;
}

// ============ Token validation ============

message GetMeRequest {
  string token = 1;
}

// ============ API Keys ============

message ApiKey {
  int64 id = 1;
  string name = 2;
  string key_prefix = 3;  // First 8 chars for identification (e.g., "sk_abc123...")
  bool read_only = 4;
  string created_at = 5;
  string expires_at = 6;
  optional string last_used_at = 7;
  optional string revoked_at = 8;
}

message CreateApiKeyRequest {
  string name = 1;
  bool read_only = 2;  // If true, key can only read data, not modify
}

message CreateApiKeyResponse {
  string key = 1;  // Full key - only shown once, store securely!
  ApiKey api_key = 2;
}

message ListApiKeysRequest {}

message ListApiKeysResponse {
  repeated ApiKey api_keys = 1;
}

message RevokeApiKeyRequest {
  int64 key_id = 1;
}

message RevokeApiKeyResponse {}

// Auth service - passkeys, Google OAuth, and API keys
service AuthService {
  // Passkey registration (2-step)
  rpc BeginPasskeyRegistration(BeginPasskeyRegistrationRequest) returns (BeginPasskeyRegistrationResponse);
  rpc FinishPasskeyRegistration(FinishPasskeyRegistrationRequest) returns (AuthResponse);

  // Passkey login (2-step)
  rpc BeginPasskeyLogin(BeginPasskeyLoginRequest) returns (BeginPasskeyLoginResponse);
  rpc FinishPasskeyLogin(FinishPasskeyLoginRequest) returns (AuthResponse);

  // Google OAuth
  rpc GetGoogleAuthUrl(GetGoogleAuthUrlRequest) returns (GetGoogleAuthUrlResponse);
  rpc GoogleCallback(GoogleCallbackRequest) returns (AuthResponse);

  // Get current user from token
  rpc GetMe(GetMeRequest) returns (User);

  // Dev login (localhost only - for testing without passkeys)
  rpc DevLogin(DevLoginRequest) returns (AuthResponse);

  // API Keys (requires auth via Authorization header)
  rpc CreateApiKey(CreateApiKeyRequest) returns (CreateApiKeyResponse);
  rpc ListApiKeys(ListApiKeysRequest) returns (ListApiKeysResponse);
  rpc RevokeApiKey(RevokeApiKeyRequest) returns (RevokeApiKeyResponse);
}
